<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bengelenbak</title>
    <link rel="icon" href="../favicon bengelenbak.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <script src="../includes/load-components.js"></script>

<main class="container">
        <section class="page-content">
            <h2>Contact</h2>

            <h3>Peuterspeelzaal De Bengelenbak</h3>
            <p>
                <strong>Brakel, Nederland</strong><br>
                <strong>Telefoonnummer:</strong> <a href="tel:06-10147636">06-10147636</a><br>
                <strong>E-mail:</strong> <a href="mailto:info@bengelenbak.nl">info@bengelenbak.nl</a>
            </p>

            <h3>Openingstijden</h3>
            <p>
                Maandag t/m vrijdag: 7:30 - 18:00 uur<br>
                Gesloten op zaterdag, zondag en feestdagen
            </p>

            <h3>Contact opnemen</h3>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Naam:</label>
                    <input type="text" id="name" name="name" required>
                </div></a>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div></a>
                <div class="form-group">
                    <label for="message">Bericht:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div></a>
                <button type="submit" class="cta-button">Verstuur</button>
            </form>
        </section>
    </main>

</body>
</html>
