            <h2>Cookie Policy (EU)</h2>

            <p>Dit cookiebeleid is voor het laatst geüpdatet op 9 maart 2026 en is van toepassing op burgers en wettelijke permanente inwoners van de Europese Economische Ruimte en Zwitserland.</p>

            <h3>1. Introductie</h3>
            <p>Op onze site, https://bengelenbak.nl (hierna: "de site") wordt gebruikgemaakt van cookies en andere aanverwante technieken. (Hierna geldt dat alle technieken voor het gemak "cookies" worden genoemd). Ook via derden die door ons zijn ingeschakeld, worden cookies geplaatst. In het onderstaande document informeren wij je over het gebruik van cookies op onze site.</p>

            <h3>2. Wat zijn cookies?</h3>
            <p>Een cookie is een klein eenvoudig bestand dat samen met pagina's van deze site wordt verzonden en door je browser op de harde schijf van je computer of ander apparaat wordt opgeslagen. De daarin opgeslagen informatie kan tijdens een volgend bezoek terug worden gestuurd naar onze servers of naar de servers van de betreffende derde partijen.</p>

            <h3>3. Wat zijn scripts?</h3>
            <p>Een script is een stukje programmacode dat wordt gebruikt om onze site goed te laten functioneren en interactief te maken. Deze code wordt uitgevoerd op onze server, of op je apparatuur.</p>

            <h3>4. Wat is een web beacon?</h3>
            <p>Een web beacon (ook pixel tag) is een klein, onzichtbaar stukje tekst of afbeelding op een site dat gebruikt wordt om verkeer op een site in kaart te brengen. Om dit te doen worden er met behulp van web beacons verschillende gegevens van je opgeslagen.</p>

            <h3>5. Cookies</h3>
            <h4>5.1 Technische of functionele cookies</h4>
            <p>Sommige cookies zorgen ervoor dat bepaalde onderdelen van de site goed werken en dat je gebruikers voorkeuren bekend blijven. Door het plaatsen van functionele cookies zorgen wij ervoor dat je onze site makkelijker kunt bezoeken. Op deze manier hoef je bijvoorbeeld niet steeds opnieuw dezelfde informatie in te voeren bij een bezoek aan onze site en is het onder andere mogelijk dat de artikelen in je winkelwagen bewaard blijven tot dat je hebt afgerekend. Deze cookies mogen wij plaatsen zonder dat je hier toestemming voor geeft.</p>

            <h4>5.2 Statistieken cookies</h4>
            <p>Wij gebruiken statistieken cookies om de beleving voor onze gebruikers te optimaliseren. Wij krijgen door middel van statistieken cookies inzicht in het gebruik van onze site. Wij vragen je toestemming om statistieken cookies te plaatsen.</p>

            <h4>5.3 Marketing/Tracking cookies</h4>
            <p>Marketing/tracking cookies zijn cookies of enige andere vorm van lokale opslag, die worden gebruikt om gebruikersprofielen te maken met het doel om advertenties te tonen of om de gebruiker te volgen op deze of verschillende sites voor soortgelijke marketingdoeleinden.</p>

            <h4>5.4 Sociale media</h4>
            <p>Op onze site hebben wij inhoud van Instagram opgenomen om webpagina's te promoten (bijv. "vind ik leuk", "pin") of te delen (bijv. "tweet") op sociale netwerken zoals Instagram. Deze inhoud is ingesloten met code die is afgeleid van Instagram en plaatst cookies. Deze inhoud kan bepaalde informatie opslaan en verwerken voor gepersonaliseerde reclame.</p>
            <p>Lees de privacyverklaring van deze partijen door (welke regelmatig kunnen wijzigen) om te weten wat zij met je (persoons)gegevens doen die zij via deze cookies verwerken. De informatie die zij verzamelen, wordt zo veel mogelijk geanonimiseerd. Instagram is gevestigd in de Verenigde Staten.</p>

            <h3>6. Geplaatste cookies</h3>
            <ul>
                <li><strong>Google Analytics</strong> - Statistics</li>
                <li><strong>WordPress</strong> - Functional</li>
                <li><strong>Complianz</strong> - Functioneel</li>
                <li><strong>Diversen</strong> - Doel wordt onderzocht</li>
            </ul>

            <h3>7. Toestemming</h3>
            <p>Wanneer je onze site voor het eerst bezoekt, tonen wij een pop-up met uitleg over cookies. Zodra je klikt op 'Save preferences' geef je ons toestemming om de categorieën cookies en plugins te gebruiken die je hebt geselecteerd in de pop-up en welke zijn omschreven in het cookiebeleid. Je kunt via je browser het plaatsen van cookies uitschakelen, je moet er dan wel rekening mee houden dat onze site dan mogelijk niet meer optimaal werkt.</p>

            <h4>7.1 Beheer uw cookie toestemming</h4>
            <ul>
                <li>Functional - Altijd actief</li>
                <li>Statistics</li>
                <li>Marketing</li>
            </ul>

            <h3>8. Cookies in-/uitschakelen en verwijderen</h3>
            <p>Je kunt je internet browser gebruiken om cookies automatisch of handmatig te verwijderen. Je kunt ook aangeven dat bepaalde cookies niet geplaatst mogen worden. Een andere optie is om de instellingen van je internetbrowser zo aan te passen dat je iedere keer dat er een cookie wordt geplaatst een bericht ontvangt. Raadpleeg voor meer informatie over deze opties de instructies in de Hulp sectie van je browser.</p>
            <p>Let op: onze site werkt mogelijk niet optimaal als alle cookies zijn uitgeschakeld. Als je wel de cookies in je browser verwijdert, worden ze na je toestemming opnieuw geplaatst bij een nieuw bezoek aan onze site.</p>

            <h3>9. Je rechten met betrekking tot persoonsgegevens</h3>
            <p>Je hebt de volgende rechten met betrekking tot je persoonsgegevens:</p>
            <ul>
                <li>Je hebt het recht om te weten waarom je persoonsgegevens nodig zijn, wat ermee gebeurt en hoe lang ze worden bewaard.</li>
                <li><strong>Recht op inzage:</strong> je kunt een verzoek indienen om inzage in de gegevens die we van je verwerken.</li>
                <li><strong>Recht op rectificatie en aanvulling:</strong> je hebt het recht om je persoonlijke gegevens aan te vullen, te corrigeren, te verwijderen of te blokkeren wanneer je maar wilt.</li>
                <li>Als je ons toestemming geeft om je gegevens te verwerken, heb je het recht om die toestemming in te trekken en je persoonlijke gegevens te laten verwijderen.</li>
                <li><strong>Recht om je gegevens over te dragen:</strong> je hebt het recht om al je persoonlijke gegevens op te vragen bij de verwerkingsverantwoordelijke en deze in hun geheel over te dragen aan een andere verwerkingsverantwoordelijke.</li>
                <li><strong>Recht op bezwaar:</strong> je kan bezwaar maken tegen de verwerking van je gegevens. Wij komen hieraan tegemoet, tenzij er gegronde redenen voor verwerking zijn.</li>
            </ul>
            <p>Om deze rechten uit te oefenen, neem contact met ons op. Verwijs naar de contactgegevens onderaan dit cookiebeleid. Als je een klacht hebt over hoe we met je gegevens omgaan, horen we graag van je, maar je hebt ook het recht om een klacht in te dienen bij de toezichthoudende autoriteit (de Autoriteit Persoonsgegevens).</p>
